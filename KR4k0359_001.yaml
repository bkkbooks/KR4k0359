body:
  text: 虞預晉書宣帝上雖服膺文藝以儒素立德而雅有雄霸之量值魏氏短祚內外多難謀而鮮過舉必獨克知人拔善顯揚側陋王基鄧艾州泰賈越之徒皆起自寒門而著績于朝經略之才可謂遠矣御覽九十五武帝武帝論平吳功唯羊祜王濬張華三人各賜絹萬匹其餘莫得此比御覽八百十七元帝愍帝以上為丞相及西都不守徵兵進而糧運稽期丞相府斬督運令史淳于伯血逆流著柱終柱末二丈三尺旋復流下四尺五寸百姓咸稱其冤御覽三百七十五王祥祥以後母故陵遲不仕年向六十刺史呂虔檄為別駕時人歌之曰海沂之康實賴王祥邦國不空別駕之功世説注一纍遷太保世説注一裴秀字季彥河東聞喜人父潛魏太常秀有風操八歲能著文叔父徽有聲名秀年十餘歲有賓客詣徽出則過秀時人為之語曰後進領袖有裴秀大將軍辟為掾父終推財與兄年二十遷黃門侍郎世説注四晉受禪封巨鹿公世説注四纍遷左光祿司空四十八薨諡元公配食宗廟同上扶風王駿字子臧宣帝第十七子好學至孝扶風王駿世説注一王浚王浚字彭祖王渾從子司空王沈賤嬖出也少時不為親黨所知渾謂弟深等曰卿等莫輕彭祖此兒平世不減方州牧伯亂世可為都督三公懷愍之世果為幽冀都督任至鼎輔如渾所説御覽五百十三荀勗荀勗字公曾潁川潁陰人漢司空爽曾孫也十餘歲能屬文外祖鍾繇曰此兒當及曾祖為安陽今民生為立祠世説注三纍遷侍中中書監世説注三魏舒魏舒少名遲鈍唯太原王乂稱之曰卿終當為台輔然亦不能令妻子免飢寒吾當助鄉營之常借給之舒受而不辭御覽四百四十一王渾王渾字玄沖太原晉陽人魏司徒昶子世説注六仕至司徒世説注六山濤山濤字巨源河內懷人祖本郡孝廉父曜冤句令濤蚤孤而貧少有器量宿士猶不慢之年十七宗人謂宣帝曰濤當與景文共綱紀天下者也帝戲曰小族那得此快人邪好莊老與稽康善為河內從事與石鑒共傳宿濤夜起踏鑒曰今何等時而眠也知太傅臥何意鑒曰宰相三日不朝與尺一令歸第君何慮焉濤曰咄石生無事于馬碲間也投傳而去果有曹爽事遂隱身不交世事務纍遷吏部尚書僕射太子少傅司徒年七十九薨諡康侯世説注一山簡山簡字季倫平雅有父風與嵇紹劉謨等齊名遷尚書出為征南將軍世説注五山嶔山嶔山嶔守潁川文選與山巨源絶交書注王戎戎父渾有令名官至淳州刺史渾薨所歷九郡義故懷其德惠相率致賻數百萬戎悉不受戎由是顯名世説注王衍王衍字夷甫琅邪臨沂人司徒戎從弟父乂平北將軍夷甫早知名以清虛通理稱仕至太尉為石勒所害世説注二樂廣樂廣字彥輔南陽清夷沖曠加有理識纍遷侍中河南尹在朝廷用心虛淡時人重貞貴代王戎為尚書令世説注二盧欽盧欽字子若少好學為尚書僕射加侍中奉車都尉書鈔引有上七字領吏部欲清實選舉稱為廉平初學記十一書鈔文選注四十六御覽二百十四欽少居名位不顧財利清虛淡泊動修禮典同郡張華家單少孤不為鄉邑所知惟欽貴異焉欽子浮字子雲三國志注二十二和嶠和嶠厚自封植嶷然不群武陔武陔字元夏沛國竹邑人父周字伯南有顯名魏位至光祿大夫陔及二弟韶茂皆總角見稱並有器望雖鄉人諸父未能覺其多少時同郡劉公榮名知人嘗造周周思見其三子謂曰鄉有知人之明欲使三兒見鄉卿為目高下以效郭許之聽可乎公榮乃自詣陔兄弟與共言語觀其舉動便出語周曰君三子皆國士也元夏器量最優有輔佐之風展力仕宦可為亞公叔夏不減常伯納言也陔少出仕宦歷職內外泰始初為吏部尚書遷左僕射右光祿大夫開府儀同三司卒于官以上亦見世説注四御覽四百四十二陔以在魏已為大臣本非佐命之數內懷遜讓不得已而居位故在官職無所荷任夙迄思恭而已終始全潔當世以為美談韶歷二官吏部郎山濤啓事稱韶清白有誠終于散騎常侍茂至侍中尚書潁川荀愷宣帝外孫世祖姑子自負貴戚要與茂交茂拒而不答由是見怒元康元年楊駿被誅愷時為尚書僕射以茂駿之姨弟陷為駿黨遂枉見殺衆咸冤痛之三國志注二十七劉頌劉頌字子雅辟州府掾奉使于蜀時蜀新平人飢土荒頌表求賑貸未報頌乃開倉出穀蜀民賴之太祖以頌專輒除名書鈔嵇康康家本姓奚會稽人先自會稽遷于譙之銍縣改為嵇氏取稽字之上與山以為姓蓋以志其本也一曰銍有嵇山家于其側遂因氏末三句亦見世説注一焉三國志注二十一庾琮庾琮字子躬潁川人太常峻第二子仕至太尉掾世説注五周處周處入晉為御史中丞多所彈糾不避強禦齊萬年反以處為建威將軍西征衆寡不敵處臨陳慷慨奮不顧命遂死于戰場贈追贈平西將軍處子玘札皆有才力中興之初並見寵任其諸子姪悉處列位為揚土豪右而札凶淫放恣為百姓所苦泰寧中王敦誅之滅其族三國志注六十西陽王羕西陽王羕西陽王羕上書曰朱旗南指自相夷戮文選與陳伯之書注趙王倫趙王倫篡位侍中常侍九十七人每朝小人滿庭貂蟬半座時人謠曰貂不足狗尾續文選為范尚書讓吏部封侯表注齊王冏齊王冏字景治齊王攸子也少聰慧及長謙讓好施趙王倫篡位冏起義兵誅倫拜大司馬加九錫政皆決之而恣用群小不復朝覲遂為長沙王所誅世説注三華軼華軼字彥夏平原人魏太尉歆曾孫也纍遷江州刺史傾心下士甚得士觀心以不從元皇命見誅世説注四祖逖祖逖字士稚范陽遒人豁蕩不修儀檢輕財好施世説注五王導王導上言曰回青蓋以反上京文選石闕銘注溫嶠溫嶠字太真太原祁人少標俊清徹英穎顯名為司空劉琨左司馬是時二都傾覆天下大亂琨聞元皇受命中興慷慷幽朔志在本朝使嶠奉使嶠喟然對曰嶠雖乏管張之才而明公有桓文之志敢辭不敏以違高旨以左長史奉使詣建康勸進世説注二元帝即位以溫嶠為散騎侍郎嶠以母亡逼賊不得往臨葬固辭詔曰嶠以未葬朝議又頗有異同故不拜其飲人坐議吾將折其衷世説注八嶠纍遷驃騎大將軍世説注二賀循賀循賀氏本姓慶氏齊伯父純儒學有重名漢安帝時為侍中江夏太守去官與江夏黃瓊漢中楊厚俱公車徵避安帝父孝德皇帝諱改為賀氏齊父輔永寧長三國志注六十賀循烈家禍流放海濱吳平還鄉里節操高厲童齓不群言行舉動必以禮讓好學博聞尤善三禮舉秀才除陽羡武康令顧榮陸機陸雲表薦循曰伏見吳興武康今賀循德量邃茂才鑒清遠服膺道素風操凝峻歷踐三城刑政肅穆守職下縣編名凡萃出自新邦朝無知已恪居遐外志不自營年時倏忽而邈無階緒實州黨愚智所為悵然臣等並以凡才纍授飾進被服恩澤忝豫朝末知良士後時而守局無言懼有蔽賢之咎是以不勝愚管謹冒死表聞久之召為太子舍人石冰破揚州循亦合衆事平杜門不出陳敏作亂以循為丹陽內史循稱疾固辭敏不敢逼于是江東豪右無不受敏爵位惟循與同郡朱誕不挂賊綱後王導説元皇帝引之循應命除吳國內史不就元皇帝為鎮東將軍請循為軍司馬帝為晉王以循為中書令固讓不受轉太常領太子太傅時朝廷初建動有疑議宗廟制度皆循所正定朝野咨詢以上六句亦見書鈔為一時儒宗年六十太興二年卒追贈司空諡曰穆循諸所著論並傳于世子隰臨海太守三國志六十五劉隗鄮隗字大連彭城人學涉有具為祕書郎避亂南渡遂為中宗從中郎甚見器遇御覽二百四十九隗為丞相司直在朝多彈糾雖上不盡從多見採用也書鈔刁協刁協字元亮渤海饒安人少好學雖不研精而多所博涉中興制度皆稟于協遷尚書令中宗信重之為王敦所忌舉兵討之奔至江南敗死世説注二戴淵戴淵一名儼字若思廣陵人才義辨濟有風標鋒穎世説注五陸機薦淵于趙王倫曰蓋聞繁弱登御然後高墉之功顯孤竹在肆然後降神之曲成伏見處士戴淵砥節立行有井泄之潔安窮樂志無風塵之慕誠東南之遺寶朝廷之貴璞也若得寄迹衢必能結軌驥騄耀質廊廟必能重光瑜璠夫枯岸之民果于輸珠潤山之客烈于貢玉蓋明暗呈形則庸識所甄也倫即辟淵世説注六纍遷征西將軍為王敦所害贈左光祿大夫儀同三司世説注五王敦克京邑參軍呂漪説敦曰周顗戴淵皆有名望足以惑衆觀近日之言無慚懼之色若不徻之役將未歇也敦即然之遂害淵顗初漪為臺郎淵既上官素有高氣以漪小器待之故售其説焉世説注八周顗周顗字伯仁汝南安城人揚州刺史浚長子也世説注二司馬彪司馬彪少篤學不倦好色薄行不交人事專精學問太始中為祕書郎後轉為丞御覽二百三十三嵇紹元康元年河間成都二王舉兵向京都朝廷北討徵嵇紹為侍中王旅不振敗績於湯陰百官侍衛莫不潰散唯紹以身捍寇兵突御輦飛矢兩集紹遂被害于帝側血濺御服及定左右欲浣衣帝曰此嵇侍中血也王豹王豹為東平主簿白事齊王曰況豹雖陋故大州之綱紀也文選為宋公修張良廟教注何楨何楨字元幹廬江人也少而好學為尚書郎特詔參祕書丞祕書本有一丞時尚未轉遂以楨為右丞右丞之置自楨始也御覽二百三十三楨為弘農郡守有楊囂生為郡吏楨一見便待以不臣之禮遂貢之天朝初學記二十
